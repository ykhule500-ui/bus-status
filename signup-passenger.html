<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passenger Sign Up — CityTransit</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-circle"></div>
    <div class="auth-bg-circle"></div>
    <div class="auth-bg-circle"></div>

    <div class="auth-card">
      <a href="../index.html" class="auth-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
      </a>

      <div class="auth-header">
        <span class="logo-text">City<span class="accent">Transit</span></span>
        <span class="auth-role-badge passenger">🚍 Passenger</span>
        <h2>Create Account</h2>
        <p>Sign up to start finding bus routes</p>
      </div>

      <form class="auth-form" id="signup-form" data-role="passenger">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="phone-input-wrapper">
            <span class="phone-prefix">+91</span>
            <input type="tel" id="phone" class="form-input" placeholder="Enter 10-digit number" maxlength="10" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required>
            <button type="button" class="password-toggle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter your password" required>
            <button type="button" class="password-toggle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login-passenger.html">Login</a></p>
      </div>
    </div>
  </div>

  <script src="../js/global.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
